# Example: Full benchmark suite with multiple tasks and configurations
# Usage: python appforge_runner.py --suite configs/example_suite.yaml

# Path to Marcus root directory
marcus_root: "/Users/lwgray/dev/marcus"

# List of AppForge tasks to run
tasks:
  - id: 63
    name: "Calculator App"
    timeout: 1800

  - id: 64
    name: "Weather App"
    timeout: 2400

  - id: 65
    name: "Note-Taking App"
    timeout: 3000

# Test multiple agent configurations
marcus_configs:
  # Single agent (baseline)
  - agents: 1

  # Small team
  - agents: 3

  # Standard team
  - agents: 5

  # Large team
  - agents: 10

# Docker configuration
docker:
  image: "budtmo/docker-android:emulator_9.0"
  vnc_port: 5900
  enable_video: false

# Optional: Parallel execution settings
# parallel:
#   max_concurrent: 2  # Run 2 benchmarks at a time
