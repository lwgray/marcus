# Example: Single AppForge benchmark (Calculator app - Task 63)
# Usage: python appforge_runner.py --suite configs/example_calculator.yaml

# Path to Marcus root directory
marcus_root: "/Users/lwgray/dev/marcus"

# List of AppForge tasks to run
tasks:
  - id: 63
    name: "Calculator App"
    timeout: 1800  # 30 minutes

# Marcus agent configurations to test
marcus_configs:
  - agents: 5
    # Default configuration with 5 agents

# Docker configuration
docker:
  image: "budtmo/docker-android:emulator_9.0"
  vnc_port: 5900
  enable_video: false  # Set true to record test execution
