[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add src to path
pythonpath = .

# Coverage settings
addopts =
    -v
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80

# Markers
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (require database, etc.)
    slow: Slow tests (take > 1 second)

# Async settings
asyncio_mode = auto
